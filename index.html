<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub | AI工具推荐与行业快讯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">AI</span>
                <span class="logo-text">Hub</span>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">内容</div>
                <a href="#" class="nav-item active" data-page="tools">
                    <span class="nav-icon">🛠️</span>
                    <span>AI 工具</span>
                </a>
                <a href="#" class="nav-item" data-page="news">
                    <span class="nav-icon">📰</span>
                    <span>AI 快讯</span>
                </a>
            </div>
            
            <div class="nav-section">
                <div class="nav-section-title">其他</div>
                <a href="admin.html" target="_blank" class="nav-item">
                    <span class="nav-icon">🔐</span>
                    <span>后台管理</span>
                </a>
            </div>
        </nav>
        
        <div class="sidebar-footer">
            <p>© 2026 AI Hub</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Tools Page -->
        <section id="tools-page" class="page active">
            <header class="page-header">
                <h1 class="page-title">AI 工具库</h1>
                <p class="page-subtitle">精选实用 AI 工具，按类别和行业分类</p>
            </header>
            
            <!-- Category Tabs -->
            <div class="category-tabs">
                <div class="tab-group">
                    <span class="tab-label">按类型</span>
                    <button class="tab-btn active" data-category="all">全部</button>
                    <button class="tab-btn" data-category="platform">通用平台</button>
                    <button class="tab-btn" data-category="video">视频 AI</button>
                    <button class="tab-btn" data-category="image">图片 AI</button>
                    <button class="tab-btn" data-category="text">文本 AI</button>
                    <button class="tab-btn" data-category="audio">音频 AI</button>
                </div>
                <div class="tab-group">
                    <span class="tab-label">按行业</span>
                    <button class="tab-btn" data-category="industry-design">设计</button>
                    <button class="tab-btn" data-category="industry-marketing">营销</button>
                    <button class="tab-btn" data-category="industry-education">教育</button>
                    <button class="tab-btn" data-category="industry-medical">医疗</button>
                    <button class="tab-btn" data-category="industry-finance">金融</button>
                    <button class="tab-btn" data-category="industry-law">法律</button>
                    <button class="tab-btn" data-category="industry-media">媒体</button>
                    <button class="tab-btn" data-category="industry-ecommerce">电商</button>
                    <button class="tab-btn" data-category="industry-game">游戏</button>
                    <button class="tab-btn" data-category="industry-code">编程</button>
                </div>
            </div>
            
            <!-- Tools Grid -->
            <div class="tools-grid" id="tools-container">
                <!-- Tools will be loaded dynamically -->
            </div>
        </section>

        <!-- News Page -->
        <section id="news-page" class="page">
            <header class="page-header">
                <h1 class="page-title">AI 快讯</h1>
                <p class="page-subtitle">追踪 AI 行业最新动态</p>
            </header>
            
            <!-- Timeline -->
            <div class="timeline" id="news-container">
                <!-- News items will be loaded dynamically -->
            </div>
        </section>

        <!-- News Detail Page -->
        <section id="news-detail-page" class="page">
            <button class="back-btn" onclick="showPage('news')">← 返回快讯列表</button>
            <article class="news-article" id="news-article">
                <!-- Article content will be loaded dynamically -->
            </article>
        </section>

        <!-- Admin Page -->
        <section id="admin-page" class="page">
            <header class="page-header">
                <h1 class="page-title">后台管理</h1>
                <p class="page-subtitle">编辑和管理网站内容</p>
            </header>
            
            <div class="admin-tabs">
                <button class="admin-tab-btn active" data-admin-tab="tools">管理工具</button>
                <button class="admin-tab-btn" data-admin-tab="news">管理快讯</button>
                <button class="admin-tab-btn" data-admin-tab="categories">管理分类</button>
            </div>
            
            <!-- Admin Tools Panel -->
            <div class="admin-panel active" id="admin-tools-panel">
                <div class="admin-header">
                    <h3>AI 工具管理</h3>
                    <button class="btn btn-primary" onclick="openToolModal()">+ 添加工具</button>
                </div>
                <div class="admin-list" id="admin-tools-list">
                    <!-- Tool list items -->
                </div>
            </div>
            
            <!-- Admin News Panel -->
            <div class="admin-panel" id="admin-news-panel">
                <div class="admin-header">
                    <h3>AI 快讯管理</h3>
                    <button class="btn btn-primary" onclick="openNewsModal()">+ 添加快讯</button>
                </div>
                <div class="admin-list" id="admin-news-list">
                    <!-- News list items -->
                </div>
            </div>
            
            <!-- Admin Categories Panel -->
            <div class="admin-panel" id="admin-categories-panel">
                <div class="admin-header">
                    <h3>分类管理</h3>
                </div>
                <div class="categories-editor">
                    <h4>工具类型分类</h4>
                    <div id="type-categories-list"></div>
                    
                    <h4>行业分类</h4>
                    <div id="industry-categories-list"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Tool Modal -->
    <div class="modal" id="tool-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="tool-modal-title">添加工具</h2>
                <button class="modal-close" onclick="closeToolModal()">×</button>
            </div>
            <form id="tool-form" class="modal-form">
                <input type="hidden" id="tool-id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="tool-name">工具名称 *</label>
                        <input type="text" id="tool-name" required>
                    </div>
                    <div class="form-group">
                        <label for="tool-url">官网链接 *</label>
                        <input type="url" id="tool-url" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tool-icon">图标 Emoji</label>
                        <input type="text" id="tool-icon" placeholder="🤖">
                    </div>
                    <div class="form-group">
                        <label for="tool-badge">徽章文本</label>
                        <input type="text" id="tool-badge" placeholder="热门/免费/新品">
                    </div>
                </div>
                <div class="form-group">
                    <label for="tool-desc">简短描述 *</label>
                    <textarea id="tool-desc" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label for="tool-content">详细介绍</label>
                    <textarea id="tool-content" rows="5"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>类型分类 *</label>
                        <div class="checkbox-group" id="tool-type-categories">
                            <label><input type="checkbox" name="type" value="platform"> 通用平台</label>
                            <label><input type="checkbox" name="type" value="video"> 视频 AI</label>
                            <label><input type="checkbox" name="type" value="image"> 图片 AI</label>
                            <label><input type="checkbox" name="type" value="text"> 文本 AI</label>
                            <label><input type="checkbox" name="type" value="audio"> 音频 AI</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>行业分类</label>
                        <div class="checkbox-group" id="tool-industry-categories">
                            <label><input type="checkbox" name="industry" value="design"> 设计</label>
                            <label><input type="checkbox" name="industry" value="marketing"> 营销</label>
                            <label><input type="checkbox" name="industry" value="education"> 教育</label>
                            <label><input type="checkbox" name="industry" value="medical"> 医疗</label>
                            <label><input type="checkbox" name="industry" value="finance"> 金融</label>
                            <label><input type="checkbox" name="industry" value="law"> 法律</label>
                            <label><input type="checkbox" name="industry" value="media"> 媒体</label>
                            <label><input type="checkbox" name="industry" value="ecommerce"> 电商</label>
                            <label><input type="checkbox" name="industry" value="game"> 游戏</label>
                            <label><input type="checkbox" name="industry" value="code"> 编程</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tool-tags">标签（逗号分隔）</label>
                    <input type="text" id="tool-tags" placeholder="国产，免费，长文本">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeToolModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- News Modal -->
    <div class="modal" id="news-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="news-modal-title">添加快讯</h2>
                <button class="modal-close" onclick="closeNewsModal()">×</button>
            </div>
            <form id="news-form" class="modal-form">
                <input type="hidden" id="news-id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="news-title">标题 *</label>
                        <input type="text" id="news-title" required>
                    </div>
                    <div class="form-group">
                        <label for="news-date">日期 *</label>
                        <input type="date" id="news-date" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="news-tag">标签</label>
                    <input type="text" id="news-tag" placeholder="行业周报/工具测评/趋势分析">
                </div>
                <div class="form-group">
                    <label for="news-excerpt">摘要 *</label>
                    <textarea id="news-excerpt" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="news-content">正文内容 (支持 Markdown) *</label>
                    <textarea id="news-content" rows="15" required></textarea>
                </div>
                <div class="form-group">
                    <label for="news-highlights">核心观点（每行一条）</label>
                    <textarea id="news-highlights" rows="5" placeholder="每行一个观点"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeNewsModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Link Confirmation Modal -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>即将离开本站</h2>
                <button class="modal-close" onclick="closeConfirmModal()">×</button>
            </div>
            <div class="modal-body">
                <p>您即将访问外部网站：</p>
                <p class="external-url" id="external-url"></p>
                <p class="confirm-notice">请确保网站安全可靠</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-primary" id="confirm-visit">继续访问</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
